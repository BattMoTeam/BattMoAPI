
services:

  api:
    build: 
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: battmo_api
    restart: always
    ports:
      # - "8081:8081"
      - "8080:8080"
    volumes:
      - ./scripts:/api/scripts
      - ./api.jl:/api/api.jl
      - ./logs:/api/logs
      - ./input_files:/api/input_files
      - ./results:/api/results
    networks:
      - app-network
    command: julia --project=. -e 'include("api.jl")'


networks:
  app-network:
    driver: bridge